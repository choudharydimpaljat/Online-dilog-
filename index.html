<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>License</title>
<style>
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --accent: #6c63ff;
  --accent2: #ff6584;
  --text: #e0e0f0;
  --muted: #555577;
  --success: #4ade80;
  --error: #ff6b6b;
  --warn: #fbbf24;
  --input-bg: rgba(255,255,255,0.05);
  --border: rgba(108,99,255,0.3);
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden; /* NO SCROLL */
  background: #12122a;
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: var(--text);
}

/* Card — fills the WebView completely, no scroll */
.card {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 5vw 5vw 4vw;
  overflow: hidden;
  position: relative;
  background: #12122a;
}

/* Top shimmer line */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
  animation: shimmer 2.5s ease-in-out infinite;
}
@keyframes shimmer { 0%{left:-100%} 100%{left:100%} }

/* Header */
.header {
  text-align: center;
  flex-shrink: 0;
  margin-bottom: 3vw;
}

.icon-wrap {
  width: 12vw; height: 12vw;
  max-width: 52px; max-height: 52px;
  border-radius: 4vw;
  background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(255,101,132,0.15));
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center; justify-content: center;
  font-size: 6vw;
  margin-bottom: 2vw;
  animation: iconFloat 3s ease-in-out infinite;
}
@keyframes iconFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

.title {
  font-size: 5vw;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  font-size: 2.8vw;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 1vw;
}

/* Divider */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  flex-shrink: 0;
  margin-bottom: 3vw;
}

/* Field label */
.label {
  font-size: 2.5vw;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 1.5vw;
  flex-shrink: 0;
}

/* Device ID */
.device-box {
  background: rgba(108,99,255,0.07);
  border: 1px solid rgba(108,99,255,0.2);
  border-radius: 3vw;
  padding: 2.5vw 3vw;
  display: flex;
  align-items: center;
  gap: 2vw;
  cursor: pointer;
  flex-shrink: 0;
  margin-bottom: 1vw;
}
.device-box:active { border-color: var(--accent); }

.device-id-val {
  flex: 1;
  font-family: 'Courier New', monospace;
  font-size: 3vw;
  color: #8b8bff;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.copy-icon { font-size: 4vw; flex-shrink: 0; opacity: 0.7; }
.copy-hint {
  font-size: 2.2vw;
  color: var(--muted);
  text-align: right;
  margin-bottom: 3vw;
  flex-shrink: 0;
}

/* Input */
.input-wrap {
  position: relative;
  flex-shrink: 0;
  margin-bottom: 2vw;
}
.key-input {
  width: 100%;
  background: var(--input-bg);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 3.5vw;
  padding: 3.5vw 10vw 3.5vw 4vw;
  color: var(--text);
  font-size: 3.5vw;
  font-family: 'Courier New', monospace;
  letter-spacing: 1px;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.key-input::placeholder {
  color: rgba(255,255,255,0.2);
  font-family: 'Segoe UI', sans-serif;
  letter-spacing: 0;
}
.key-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
}
.key-input.error { border-color: var(--error); }
.key-icon {
  position: absolute;
  right: 3.5vw; top: 50%;
  transform: translateY(-50%);
  font-size: 4.5vw;
  pointer-events: none;
  opacity: 0.5;
}

/* Progress */
.progress {
  height: 2px;
  background: rgba(108,99,255,0.12);
  border-radius: 2px;
  overflow: hidden;
  display: none;
  flex-shrink: 0;
  margin-bottom: 2vw;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  animation: pSlide 1.2s ease-in-out infinite;
}
@keyframes pSlide { 0%{width:0%;margin-left:0%} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }

/* Status */
.status {
  font-size: 3vw;
  min-height: 8vw;
  padding: 2vw 3vw;
  border-radius: 2.5vw;
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1.4;
  flex-shrink: 0;
  margin-bottom: 2.5vw;
  transition: all 0.3s;
}

/* Button */
.btn {
  width: 100%;
  padding: 4vw;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border: none;
  border-radius: 3.5vw;
  color: white;
  font-size: 3.8vw;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(108,99,255,0.3);
  transition: transform 0.15s, opacity 0.15s;
  flex-shrink: 0;
  margin-bottom: 3vw;
}
.btn:active:not(:disabled) { transform: scale(0.97); }
.btn:disabled { opacity: 0.45; }

/* Footer */
.footer {
  text-align: center;
  font-size: 2.8vw;
  color: var(--muted);
  flex-shrink: 0;
}
.footer a { color: #8b8bff; text-decoration: none; }

/* Success overlay */
.success-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(13,13,26,0.97);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 8vw;
  z-index: 99;
}
.success-overlay.show { display: flex; }

.success-ring {
  width: 18vw; height: 18vw;
  border-radius: 50%;
  border: 2px solid var(--success);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10vw;
  margin-bottom: 4vw;
  animation: ringPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  box-shadow: 0 0 30px rgba(74,222,128,0.2);
}
@keyframes ringPop { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
.success-title { font-size: 6vw; font-weight: 700; color: var(--success); margin-bottom: 2vw; }
.success-sub { font-size: 3.5vw; color: var(--muted); line-height: 1.6; }
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="icon-wrap">🔐</div>
    <div class="title">License Activation</div>
    <div class="subtitle">NMMS MOD · Pro</div>
  </div>

  <div class="divider"></div>

  <div class="label">📱 Device ID</div>
  <div class="device-box" onclick="copyDeviceId()">
    <span class="device-id-val" id="deviceVal">Detecting...</span>
    <span class="copy-icon">📋</span>
  </div>
  <div class="copy-hint">tap to copy</div>

  <div class="label">🔑 License Key</div>
  <div class="input-wrap">
    <input type="text" class="key-input" id="keyInput"
      placeholder="NMMS-XXXX-YYYY-ZZZZ"
      autocomplete="off" spellcheck="false"
      autocorrect="off" autocapitalize="characters"/>
    <span class="key-icon">🗝️</span>
  </div>

  <div class="progress" id="progressBar"><div class="progress-fill"></div></div>

  <div class="status" id="statusBox">Key enter karke activate karo</div>

  <button class="btn" id="activateBtn" onclick="activate()">⚡ Activate Now</button>

  <div class="footer">
    Key chahiye? &nbsp;<a href="https://t.me/nmmsmod">📲 t.me/nmmsmod</a>
  </div>

  <div class="success-overlay" id="successOverlay">
    <div class="success-ring">✓</div>
    <div class="success-title">Activated!</div>
    <div class="success-sub">License verified.<br>App unlock ho raha hai...</div>
  </div>

</div>

<script>
// 🔧 Key file URL — seedha hardcoded
var KEYS_URL = "https://raw.githubusercontent.com/choudharydimpaljat/Demo/refs/heads/main/Key";

var deviceId = "";

function setDeviceId(id) {
  deviceId = id || "";
  document.getElementById("deviceVal").textContent = id || "Unknown";
}

window.addEventListener("load", function() {
  try {
    if (typeof AndroidBridge !== "undefined") {
      var id = AndroidBridge.getDeviceId();
      if (id) setDeviceId(id);
    }
  } catch(e) {}
});

function copyDeviceId() {
  if (!deviceId) return;
  try {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(deviceId);
    } else {
      var t = document.createElement("textarea");
      t.value = deviceId;
      document.body.appendChild(t);
      t.select();
      document.execCommand("copy");
      document.body.removeChild(t);
    }
    setStatus("📋 Device ID copied!", "var(--accent)");
  } catch(e) {}
}

function activate() {
  var key = document.getElementById("keyInput").value.trim().toUpperCase();
  if (!key) {
    setStatus("❌ License key daalo!", "var(--error)");
    shake(); return;
  }
  setLoading(true);
  setStatus("🔄 Verifying...", "var(--text)");

  fetch(KEYS_URL + "?t=" + Date.now(), { cache: "no-store" })
    .then(function(r) {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    })
    .then(function(data) { verify(data.keys || [], key); })
    .catch(function() {
      setLoading(false);
      setStatus("⚠️ Net error. Connection check karo.", "var(--warn)");
      try { AndroidBridge.onLicenseFailed("network"); } catch(e) {}
    });
}

function verify(keys, inputKey) {
  var found = null;
  for (var i = 0; i < keys.length; i++) {
    if ((keys[i].key || "").toUpperCase() === inputKey) { found = keys[i]; break; }
  }
  setLoading(false);

  if (!found) {
    setStatus("❌ Invalid License Key!", "var(--error)"); shake();
    try { AndroidBridge.onLicenseFailed("invalid"); } catch(e) {}
    return;
  }
  if (found.banned === true) {
    setStatus("🚫 Key banned hai! Admin se contact karo.", "var(--error)");
    try { AndroidBridge.onLicenseFailed("banned"); } catch(e) {}
    return;
  }
  if (found.expiry && found.expiry !== "lifetime") {
    var exp = new Date(found.expiry); exp.setHours(23,59,59);
    if (new Date() > exp) {
      setStatus("⏰ License expire ho gayi!", "var(--error)");
      try { AndroidBridge.onLicenseFailed("expired"); } catch(e) {}
      return;
    }
  }
  var bound = found.device_id || "any";
  if (bound !== "any" && bound !== "" && deviceId && bound !== deviceId) {
    setStatus("📵 Yeh key is device ke liye nahi!\nDevice ID admin ko bhejo.", "var(--error)");
    try { AndroidBridge.onLicenseFailed("device_mismatch"); } catch(e) {}
    return;
  }

  // SUCCESS
  document.getElementById("successOverlay").classList.add("show");
  setTimeout(function() {
    try { AndroidBridge.onLicenseSuccess(inputKey, found.offline_login === true); } catch(e) {}
  }, 1300);
}

function setStatus(msg, color) {
  var el = document.getElementById("statusBox");
  el.textContent = msg;
  el.style.color = color || "var(--muted)";
  el.style.background = color ? "rgba(0,0,0,0.2)" : "rgba(255,255,255,0.03)";
}
function setLoading(on) {
  document.getElementById("activateBtn").disabled = on;
  document.getElementById("progressBar").style.display = on ? "block" : "none";
  document.getElementById("keyInput").disabled = on;
}
function shake() {
  var el = document.getElementById("keyInput");
  el.classList.add("error");
  setTimeout(function(){ el.classList.remove("error"); }, 1200);
}
</script>
</body>
</html>
